# Generated by RepoWarden. Extend Semgrep's registry packs with a
# conservative exclude list so CI doesn't re-flag noise the runner already
# filtered. Keep in sync with apps/runner/src/code-quality-scan-filter.ts.
rules: []

# Semgrep CLI reads include/exclude from this file when --config <path> is used.
# The pack list below is what the RepoWarden runner uses too — change it here
# and update the runner constant to match.
include:
  - p/default
  - p/security-audit
  - p/owasp-top-ten
  - p/javascript
  - p/typescript

exclude:
  - "**/__tests__/**"
  - "**/__snapshots__/**"
  - "**/__mocks__/**"
  - "**/__generated__/**"
  - "**/fixtures/**"
  - "**/testdata/**"
  - "**/node_modules/**"
  - "**/vendor/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/out/**"
  - "**/.next/**"
  - "**/.nuxt/**"
  - "**/.turbo/**"
  - "**/migrations/**"
  - "**/drizzle/**"
  - "**/*.min.js"
  - "**/*.min.css"
  - "**/*.bundle.js"
  - "**/*.test.*"
  - "**/*.spec.*"
  - "**/*_test.go"
  - "**/*_test.py"
  - "**/*_test.rb"
